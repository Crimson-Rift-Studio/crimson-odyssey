name: Package Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm install
      - run: npm run verify
      - name: Build package
        run: |
          npm pack
          sha256sum crimson-odyssey-*.tgz > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            crimson-odyssey-*.tgz
            SHA256SUMS.txt
